<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#grad1)"/>
  
  <!-- Subtle gradient overlay -->
  <rect width="1920" height="1080" fill="url(#grad2)"/>
  
  <!-- People/Candidates silhouettes - left side -->
  <g opacity="0.15" fill="#3b82f6">
    <!-- Person 1 -->
    <circle cx="150" cy="200" r="25"/>
    <path d="M 120 240 Q 150 280 180 240 L 180 330 M 150 280 L 120 340 M 150 280 L 180 340"/>
    
    <!-- Person 2 -->
    <circle cx="300" cy="280" r="22"/>
    <path d="M 273 318 Q 300 355 327 318 L 327 400 M 300 355 L 273 410 M 300 355 L 327 410"/>
    
    <!-- Person 3 -->
    <circle cx="100" cy="600" r="28"/>
    <path d="M 65 650 Q 100 695 135 650 L 135 750 M 100 695 L 65 750 M 100 695 L 135 750"/>
    
    <!-- Person 4 -->
    <circle cx="400" cy="750" r="24"/>
    <path d="M 372 790 Q 400 830 428 790 L 428 870 M 400 830 L 372 885 M 400 830 L 428 885"/>
  </g>
  
  <!-- Job posting cards - center -->
  <g opacity="0.08" fill="none" stroke="#60a5fa" stroke-width="2">
    <!-- Card 1 -->
    <rect x="800" y="150" width="280" height="180" rx="12"/>
    <line x1="820" y1="190" x2="1060" y2="190" stroke-width="1"/>
    <line x1="820" y1="220" x2="1000" y2="220" stroke-width="1"/>
    <line x1="820" y1="250" x2="1050" y2="250" stroke-width="1"/>
    
    <!-- Card 2 -->
    <rect x="1100" y="300" width="280" height="180" rx="12"/>
    <line x1="1120" y1="340" x2="1360" y2="340" stroke-width="1"/>
    <line x1="1120" y1="370" x2="1300" y2="370" stroke-width="1"/>
    <line x1="1120" y1="400" x2="1350" y2="400" stroke-width="1"/>
  </g>
  
  <!-- Checkmarks/Success indicators - right side -->
  <g opacity="0.1" stroke="#10b981" stroke-width="3" fill="none">
    <!-- Checkmark 1 -->
    <path d="M 1650 350 L 1680 380 L 1720 330" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Checkmark 2 -->
    <path d="M 1750 600 L 1780 630 L 1820 580" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Checkmark 3 -->
    <path d="M 1700 800 L 1730 830 L 1770 780" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Brain/AI icons - scattered -->
  <g opacity="0.08" fill="#a78bfa">
    <!-- Brain outline 1 -->
    <circle cx="250" cy="900" r="30"/>
    <path d="M 225 890 Q 220 870 230 850 Q 245 855 250 870 Q 255 855 270 850 Q 280 870 275 890"/>
    
    <!-- Brain outline 2 -->
    <circle cx="1750" cy="950" r="25"/>
    <path d="M 1730 942 Q 726 925 1735 905 Q 1748 910 1750 925 Q 1752 910 1765 905 Q 1774 925 1770 942"/>
  </g>
  
  <!-- Connection lines (representing job-candidate matching) -->
  <g opacity="0.06" stroke="#60a5fa" stroke-width="1.5">
    <line x1="400" y1="350" x2="900" y2="250"/>
    <line x1="150" y1="650" x2="1100" y2="400"/>
    <line x1="450" y1="800" x2="1200" y2="500"/>
  </g>
  
  <!-- Circles representing data/AI processing -->
  <g opacity="0.05" fill="none" stroke="#3b82f6" stroke-width="2">
    <circle cx="600" cy="400" r="80"/>
    <circle cx="600" cy="400" r="100" opacity="0.7"/>
    <circle cx="600" cy="400" r="120" opacity="0.4"/>
    
    <circle cx="1300" cy="700" r="60"/>
    <circle cx="1300" cy="700" r="80" opacity="0.7"/>
    <circle cx="1300" cy="700" r="100" opacity="0.4"/>
  </g>
</svg>